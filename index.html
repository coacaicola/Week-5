<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Moving Dance and Art</title>

  <style>
    body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: transparent;
      font-family: Arial, Helvetica, sans-serif;
    }

    /* 1st iframe */
    iframe {
      position: fixed;
      top: 261px;
      left: 0;
      width: 100vw;
      height: 100vh;
      border: none;
      z-index: 0;
    }

    /* header */
    .header {
      z-index: 10;
      color: #efca62;
      font-size: 180pt;
      text-align: center;
      font-weight: bold;
      background-color: #3f22ec;
    }

    .header span {
      display: inline-block;
      transition: transform 0.3s ease;
    }

    .header span:hover {
      transform: translateY(-15px) scale(1.2);
    }

    h1 {
      position: relative;
      z-index: 10;
      color: #fa58a7;
      font-size: 57pt;
      margin-right: 50pt;
      text-align: right;
    }

    p {
      position: relative;
      z-index: 10;
      color: #ffead6;
      font-size: 20pt;
      margin-right: 50pt;
      text-align: right;
    }

    p span {
      display: inline-block;
      transition: transform 0.3s ease;
    }

    p span:hover {
      transform: translateY(-15px) scale(1.2);
    }
  </style>
</head>

<body>

  <! single frame>
  <iframe id="sketchFrame" src="sketch.html"></iframe>

  <! header>
  <div class="header">
    <span>S</span><span>P</span><span>A</span><span>C</span><span>E</span>
  </div>

<h1>INSTRUCTIONS</h1>

  <p style="padding: 20px; font-style: italic;">
    <span>Move</span> <span>your</span> <span>body!</span>
  </p>
  <p> press spacebar when you're done moving to view art
  </p>

  <!switch pages>
  <script>
    let current = 1;
    function switchSketch() {
      const frame = document.getElementById("sketchFrame");
     
      current++;
      if (current > 2) current = 1;
      if (current === 1) {
        frame.src = "sketch.html";
      }

      if (current === 2) {
        frame.src = "sketch2.html";
      }
    }
    // press spacebar to switch pages
    window.addEventListener("keydown", function (e) {
      if (e.code === "Space") {
        switchSketch();
      }
    });
  </script>

</body>
</html>
